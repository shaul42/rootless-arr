name: Build Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load build matrix
        id: matrix
        run: |
          json='{"include":['
          sep=''
          while IFS=$'\t' read -r service app_kind app_bin app_port app_version app_download_url app_download_sha256; do
            if [[ "${service}" == "service" || -z "${service}" ]]; then
              continue
            fi
            json+="${sep}{\"service\":\"${service}\",\"app_kind\":\"${app_kind}\",\"app_bin\":\"${app_bin}\",\"app_port\":\"${app_port}\",\"app_version\":\"${app_version}\",\"app_download_url\":\"${app_download_url}\",\"app_download_sha256\":\"${app_download_sha256}\"}"
            sep=','
          done < build-matrix.tsv
          json+=']}'
          echo "json=${json}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: repo
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.value }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ matrix.app_version }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ./image
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_UID=1000
            APP_GID=1000
            APP_ID=${{ matrix.service }}
            APP_KIND=${{ matrix.app_kind }}
            APP_BIN=${{ matrix.app_bin }}
            APP_PORT=${{ matrix.app_port }}
            APP_DOWNLOAD_URL=${{ matrix.app_download_url }}
            APP_DOWNLOAD_SHA256=${{ matrix.app_download_sha256 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
