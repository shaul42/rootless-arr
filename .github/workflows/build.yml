name: Build Images

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: sonarr
            app_bin: Sonarr
            app_port: "8989"
            app_download_url: "https://services.sonarr.tv/v1/download/main/latest?version=4&os=linux&arch=x64"
          - service: radarr
            app_bin: Radarr
            app_port: "7878"
            app_download_url: "https://radarr.servarr.com/v1/update/master/updatefile?runtime=netcore&os=linux&arch=x64"
          - service: prowlarr
            app_bin: Prowlarr
            app_port: "9696"
            app_download_url: "https://prowlarr.servarr.com/v1/update/master/updatefile?runtime=netcore&os=linux&arch=x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: repo
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.value }}/rootless-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ./image
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_UID=1000
            APP_GID=1000
            APP_ID=${{ matrix.service }}
            APP_BIN=${{ matrix.app_bin }}
            APP_PORT=${{ matrix.app_port }}
            APP_DOWNLOAD_URL=${{ matrix.app_download_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
